<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;600&display=swap" rel="stylesheet">
  <style>
    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: "Nunito Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      font-weight: 600;
    }
    p, a {
      font-family: "Nunito Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      font-weight: 300;
    }

    /* Primary: #1A1A1A bg / #FFFFFF font */
    body { background-color: #FFFFFF; color: #1A1A1A; }
    .navbar-custom { background-color: #1A1A1A !important; }
    .navbar-custom .nav-link { color: rgba(255,255,255,0.75) !important; font-weight: 600; letter-spacing: 0.04em; font-size: 0.85rem; }
    .navbar-custom .nav-link:hover, .navbar-custom .nav-link.active { color: #ffffff !important; }
    .navbar-custom .btn-outline-secondary { color: #ffffff !important; border-color: rgba(255,255,255,0.4) !important; }
    .navbar-custom .btn-outline-secondary:hover { background-color: rgba(255,255,255,0.1) !important; color: #ffffff !important; border-color: #ffffff !important; }
    .navbar-custom .form-control { background-color: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); color: #ffffff; }
    .navbar-custom .form-control::placeholder { color: rgba(255,255,255,0.5); }
    .navbar-custom .form-control:focus { background-color: rgba(255,255,255,0.15); color: #ffffff; border-color: rgba(255,255,255,0.6); box-shadow: none; }
    .btn-primary { background-color: #1A1A1A !important; border-color: #1A1A1A !important; color: #FFFFFF !important; }
    .btn-primary:hover { background-color: #333333 !important; border-color: #333333 !important; }

    /* Secondary: #058531 bg / #FFFFFF font */
    .btn-secondary { background-color: #058531 !important; border-color: #058531 !important; color: #FFFFFF !important; }
    .btn-secondary:hover { background-color: #046b27 !important; border-color: #046b27 !important; }
    .btn-outline-secondary { border-color: #058531 !important; color: #058531 !important; }
    .btn-outline-secondary:hover { background-color: #058531 !important; color: #FFFFFF !important; }

    /* Footer: #343A40 bg / #FFFFFF font */
    .footer-custom { background-color: #343A40 !important; }
    .footer-custom a { color: #FFFFFF !important; }

    /* Bottom action bar */
    .pseudo-nav-custom { background-color: #343A40 !important; }

    /* Alternating card backgrounds on mobile */
    @media (max-width: 991.98px) {
      .compare-card:nth-child(even) .card { background-color: #f5f5f5; }
    }
  </style>
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom border-bottom sticky-top">
    <div class="container-fluid">
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="index.html">HOME</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="catalog.html">CATALOG</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="wishlist.html">WISHLIST</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="catalog.html#deals">DEALS</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0">
          <form class="input-group" action="catalog.html" method="get">
            <button class="btn btn-outline-secondary" type="submit">
              <i class="bi bi-search"></i>
            </button>
            <input type="text" name="q" class="form-control" placeholder="search">
          </form>
          <a class="btn btn-outline-secondary rounded-circle" href="Cart.html" aria-label="Cart">
            <i class="bi bi-bag-heart-fill"></i>
          </a>
          <button class="btn btn-outline-secondary rounded-circle" aria-label="User Profile">
            <i class="bi bi-person-circle"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container-fluid p-4 flex-grow-1">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="#">Catalog</a></li>
        <li class="breadcrumb-item"><span>Compare</span></li>
      </ol>
    </nav>

    <!-- Card Grid — populated from compareList in localStorage -->
    <div class="row g-3" id="compare-grid"></div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function addToCart(name, price) {
      const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      let cart = [];
      try { cart = JSON.parse(localStorage.getItem('cart')) || []; } catch {}
      const existing = cart.find(i => i.id === id);
      if (existing) { existing.qty += 1; } else { cart.push({ id, name, price: parseFloat(price), qty: 1, image: '', alt: name }); }
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    const deviceLabels = { pc: 'PC', playstation: 'PlayStation', xbox: 'Xbox', nintendo: 'Nintendo Switch', mobile: 'Mobile' };
    const compatLabels = { wired: 'Wired', wireless: 'Wireless', bluetooth: 'Bluetooth', 'usb-c': 'USB-C', 'usb-a': 'USB-A' };

    function starsHTML(rating) {
      let html = '';
      for (let i = 1; i <= 5; i++) {
        if (rating >= i)             html += '<i class="bi bi-star-fill" style="color:#058531;"></i>';
        else if (rating >= i - 0.5)  html += '<i class="bi bi-star-half" style="color:#058531;"></i>';
        else                         html += '<i class="bi bi-star" style="color:#058531;"></i>';
      }
      return html;
    }

    function getWishlist() {
      return JSON.parse(localStorage.getItem('wishlist')) || [];
    }

    function renderCompare() {
      const compareList = JSON.parse(localStorage.getItem('compareList')) || [];
      const grid = document.getElementById('compare-grid');
      grid.innerHTML = '';

      // Render filled slots
      compareList.forEach(product => {
        const specs = [
          ...product.devices.map(d => deviceLabels[d] || d),
          ...product.compats.map(c => compatLabels[c] || c)
        ];
        const wishlisted = getWishlist().some(i => i.name === product.name);
        const col = document.createElement('div');
        col.className = 'col-12 col-lg-3 compare-card';
        col.innerHTML = `
          <div class="card h-100">
            <div class="ratio ratio-16x9 bg-secondary">
              <img src="" alt="${product.name}" class="img-thumbnail w-100 h-100 object-fit-cover">
            </div>
            <div class="card-body">
              <h6 class="card-title">${product.name}</h6>
              <p class="card-text small text-muted">${product.label}</p>
              <p class="card-text fw-bold">$${product.price.toFixed(2)}</p>
              <hr>
              <h6>Specifications</h6>
              <ul class="list-unstyled small">
                ${specs.map(s => `<li>${s}</li>`).join('')}
              </ul>
              <hr>
              <h6>Reviews</h6>
              <div class="small">${starsHTML(product.rating)} (${product.rating}/5)</div>
              <hr>
              <div class="d-flex flex-column gap-2 mt-2">
                <a class="btn btn-primary btn-sm" href="checkout.html">
                  <i class="bi bi-bag-check me-1"></i> Buy Now
                </a>
                <button class="btn btn-secondary btn-sm add-to-cart-btn" data-name="${product.name}" data-price="${product.price}">
                  <i class="bi bi-cart-plus me-1"></i> Add to Cart
                </button>
                <button class="btn btn-sm wishlist-btn w-100 ${wishlisted ? 'btn-success' : 'btn-secondary'}" data-name="${product.name}">
                  <i class="bi ${wishlisted ? 'bi-check-lg' : 'bi-heart'} me-1"></i>
                  ${wishlisted ? 'In Wishlist' : 'Wishlist'}
                </button>
              </div>
              <button class="btn btn-sm btn-outline-danger w-100 mt-2 remove-btn" data-name="${product.name}">
                Remove
              </button>
            </div>
          </div>`;
        grid.appendChild(col);
      });

      // Render empty slots up to 4
      for (let i = compareList.length; i < 4; i++) {
        const col = document.createElement('div');
        col.className = 'col-12 col-lg-3 compare-card';
        col.innerHTML = `
          <div class="card h-100 d-flex align-items-center justify-content-center text-center text-muted" style="min-height:200px;">
            <div class="card-body">
              <i class="bi bi-plus-circle" style="font-size:2rem;"></i>
              <p class="mt-2 mb-2 small">Add an item to compare</p>
              <a href="catalog.html" class="btn btn-sm btn-outline-secondary">Browse Catalog</a>
            </div>
          </div>`;
        grid.appendChild(col);
      }

      // Add to Cart button handlers
      grid.querySelectorAll('.add-to-cart-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          addToCart(this.dataset.name, this.dataset.price);
          this.innerHTML = '<i class="bi bi-check-lg me-1"></i> Added!';
          setTimeout(() => { this.innerHTML = '<i class="bi bi-cart-plus me-1"></i> Add to Cart'; }, 1500);
        });
      });

      // Wishlist button handlers
      grid.querySelectorAll('.wishlist-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const name = this.dataset.name;
          const compareList = JSON.parse(localStorage.getItem('compareList')) || [];
          const product = compareList.find(p => p.name === name);
          if (!product) return;
          let list = getWishlist();
          const idx = list.findIndex(i => i.name === name);
          if (idx === -1) {
            list.unshift({ name: product.name, price: '$' + product.price.toFixed(2), href: product.link, label: product.label });
            this.className = 'btn btn-sm wishlist-btn w-100 btn-success';
            this.innerHTML = '<i class="bi bi-check-lg me-1"></i> In Wishlist';
          } else {
            list.splice(idx, 1);
            this.className = 'btn btn-sm wishlist-btn w-100 btn-secondary';
            this.innerHTML = '<i class="bi bi-heart me-1"></i> Wishlist';
          }
          localStorage.setItem('wishlist', JSON.stringify(list));
        });
      });

      // Remove button handlers
      grid.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          let list = JSON.parse(localStorage.getItem('compareList')) || [];
          list = list.filter(p => p.name !== this.dataset.name);
          localStorage.setItem('compareList', JSON.stringify(list));
          renderCompare();
        });
      });
    }

    renderCompare();
  </script>
  <script>
    // Active link highlighting based on current page
    const pageAliases = { 'compare.html': 'catalog.html' };
    const rawPage = window.location.pathname.split('/').pop() || 'index.html';
    const currentPage = pageAliases[rawPage] || rawPage;
    document.querySelectorAll('.navbar-nav .nav-link').forEach(link => {
      const linkHref = link.getAttribute('href');
      if (!linkHref.includes('#') && linkHref === currentPage) {
        link.classList.add('active', 'fw-bold');
        link.style.color = '#ffffff';
      }
    });

    // Active breadcrumb highlighting
    const breadcrumbMap = { 'compare.html': 'Compare', 'catalog.html': 'Catalog' };
    const activeLabel = breadcrumbMap[rawPage];
    if (activeLabel) {
      document.querySelectorAll('.breadcrumb-item').forEach(item => {
        if (item.textContent.trim() === activeLabel) {
          item.classList.add('active', 'fw-bold');
          item.setAttribute('aria-current', 'page');
          item.style.color = '#058531';
          const span = item.querySelector('span');
          if (span) span.style.borderBottom = '2px solid #058531';
        }
      });
    }

  </script>
</body>
</html>
