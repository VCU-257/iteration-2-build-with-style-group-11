<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews</title>
  <!-- Bootswatch Lux Theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/lux/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <!-- Nunito Sans Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;600;700&display=swap" rel="stylesheet">

  <style>
    body, p, a, li, span, div {
      font-family: "Nunito Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-weight: 300;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: "Nunito Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-weight: 600;
    }

    /* Primary: #1A1A1A bg / #FFFFFF text */
    .btn-primary {
      background-color: #1a1a1a;
      border-color: #1a1a1a;
      color: #ffffff;
    }
    .btn-primary:hover {
      background-color: #333333;
      border-color: #333333;
      color: #ffffff;
    }

    /* Secondary: #058531 bg / #FFFFFF text */
    .btn-secondary {
      background-color: #058531;
      border-color: #058531;
      color: #ffffff;
    }
    .btn-secondary:hover {
      background-color: #046b27;
      border-color: #046b27;
      color: #ffffff;
    }

    /* Navbar: primary color */
    .navbar {
      background-color: #1a1a1a !important;
    }
    .navbar .nav-link {
      color: rgba(255, 255, 255, 0.75) !important;
      font-weight: 600;
      letter-spacing: 0.04em;
      font-size: 0.85rem;
    }
    .navbar .nav-link:hover,
    .navbar .nav-link.active {
      color: #ffffff !important;
    }
    .navbar .btn-outline-secondary {
      color: #ffffff;
      border-color: rgba(255,255,255,0.4);
    }
    .navbar .btn-outline-secondary:hover {
      background-color: rgba(255,255,255,0.1);
      color: #ffffff;
      border-color: #ffffff;
    }
    .navbar .form-control {
      background-color: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.3);
      color: #ffffff;
    }
    .navbar .form-control::placeholder {
      color: rgba(255,255,255,0.5);
    }
    .navbar .form-control:focus {
      background-color: rgba(255,255,255,0.15);
      color: #ffffff;
      border-color: rgba(255,255,255,0.6);
      box-shadow: none;
    }

    /* Sidebar */
    #sidebar {
      background-color: #f4f4f4 !important;
      border-right: 1px solid #e0e0e0;
    }
    .filter-bar {
      background-color: #d0d0d0;
      border-radius: 4px;
      height: 14px;
    }

    /* Product summary card */
    .product-summary-card {
      background-color: #f8f8f8;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
    }
    .product-image-placeholder {
      background-color: #d0d0d0;
      border-radius: 6px;
      width: 160px;
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-weight: 600;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    /* Review stars: green accent */
    .star-rating i {
      color: #058531;
    }

    /* Review content box */
    .review-box {
      background-color: #f8f8f8;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 1rem;
      min-height: 100px;
      font-size: 0.9rem;
      color: #555;
    }

    /* Avatar placeholder */
    .avatar-placeholder {
      background-color: #d0d0d0;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    /* Bottom action bar */
    .bottom-bar {
      background-color: #1a1a1a;
      border-top: 1px solid #333;
    }
    .bottom-bar .btn-outline-secondary {
      color: #ffffff;
      border-color: rgba(255,255,255,0.3);
      border-radius: 50rem;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
    }
    .bottom-bar .btn-outline-secondary:hover {
      background-color: #058531;
      border-color: #058531;
      color: #ffffff;
    }

    /* Section label */
    .section-label {
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #1a1a1a;
      border-bottom: 2px solid #058531;
      display: inline-block;
      padding-bottom: 2px;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body class="vh-100 d-flex flex-column overflow-hidden" style="background-color: #ffffff; color: #1a1a1a;">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg border-bottom">
    <div class="container-fluid">
      <div class="navbar-collapse">
        <ul class="navbar-nav me-auto mb-0">
          <li class="nav-item">
            <a class="nav-link fw-bold" href="index.html">HOME</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="catalog.html">CATALOG</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="wishlist.html">WISHLIST</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#deals">DEALS</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          <div class="input-group">
            <a class="btn btn-outline-secondary" href="catalog.html">
              <i class="bi bi-search"></i>
            </a>
            <input type="text" class="form-control" placeholder="search">
          </div>
          <a class="btn btn-outline-secondary rounded-circle" href="Cart.html" aria-label="Cart">
            <i class="bi bi-bag-heart-fill"></i>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <div class="d-flex flex-grow-1 overflow-hidden">

    <!-- Main -->
    <div class="p-3 flex-grow-1 overflow-y-auto" style="background-color: #ffffff;">

      <!-- Product summary card -->
      <div class="d-flex gap-3 mb-4 p-3 product-summary-card">
        <div class="product-image-placeholder">Picture</div>
        <div class="d-flex flex-column justify-content-center">
          <div class="fw-bold fs-5 mb-2" style="color: #1a1a1a;">Name of the product</div>
          <div class="fst-italic mb-2" style="color: #666; font-size: 0.9rem;">Description</div>
          <hr class="my-1" style="border-color: #e0e0e0;">
          <hr class="my-1" style="border-color: #e0e0e0;">
        </div>
      </div>

      <!-- Reviews section -->
      <div class="section-label">Reviews</div>

      <div class="d-flex gap-3 mb-4">
        <div class="avatar-placeholder"></div>
        <div class="flex-grow-1">
          <div class="star-rating fs-5 mb-1">
            <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i>
          </div>
          <div class="review-box">Customer reviews</div>
        </div>
      </div>

      <div class="d-flex gap-3 mb-4">
        <div class="avatar-placeholder"></div>
        <div class="flex-grow-1">
          <div class="star-rating fs-5 mb-1">
            <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i>
          </div>
          <div class="review-box">Customer reviews</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Bottom bar -->
  <div class="d-flex gap-3 p-3 bottom-bar">
    <a class="btn btn-outline-secondary flex-grow-1" href="checkout.html">Buy Now</a>
    <a class="btn btn-outline-secondary flex-grow-1" href="cart.html">Add to Cart</a>
    <a class="btn btn-outline-secondary flex-grow-1" href="wishlist.html">Wishlist</a>
    <a class="btn btn-outline-secondary flex-grow-1" href="review.html">Write Review</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
