    <!-- Listen for the user to press the x button-->
    <script>
    document.querySelectorAll('.remove-btn').forEach(function(btn) {
        btn.addEventListener('click', function(X) {
            X.preventDefault();
            X.stopPropagation();
            this.closest('.wishlist-row').remove();
        });
    });
    </script>

    <!-- Adds the wishlisted item to the cart by adding a notification to the cart icon-->
    <script>
    document.querySelectorAll('.add-to-cart-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            //// Get the cart badge element from the navbar
            const badge = document.getElementById('cartBadge');
            // reveals the notification icon on cart
            badge.classList.remove('d-none');
            let count = parseInt(badge.textContent) || 0;
            //// Increment the count by 1 and update the badge text
            badge.textContent = count + 1;
        });
    });
</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Save current wishlist DOM state to localStorage
      function saveWishlist() {
        const items = [];
        document.querySelectorAll('.wishlist-row').forEach(row => {
          items.push({
            name:  row.querySelector('.flex-grow-1 p')?.textContent.trim() || '',
            price: row.querySelector('.fw-bold')?.textContent.trim() || '',
            href:  row.querySelector('a.stretched-link')?.getAttribute('href') || 'description.html'
          });
        });
        localStorage.setItem('wishlist', JSON.stringify(items));
      }

      // Save on page load so index.html always has fresh data
      saveWishlist();

      // Re-save after each item is removed
      document.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', () => setTimeout(saveWishlist, 0));
      });
    </script>
