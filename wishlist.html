<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wishlist</title>

    <!-- Lux Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/lux/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <style>
        .wishlist-row {
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .wishlist-row:hover {
            background-color: #c8c8c8 !important;
        }
        /* Ensures the 'X' button stays visible and clickable over the link */
        .z-index-top {
            z-index: 3;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">
<!-- AI added the Theme throughout the navbar of Lux -->
<nav class="navbar navbar-expand-lg bg-primary sticky-top" data-bs-theme="dark">
    <div class="container-fluid">
        <div class="navbar-collapse">
            <ul class="navbar-nav me-auto mb-0">
            <li class="nav-item">
                <a class="nav-link" href="index.html">HOME</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="catalog.html#deals">CATALOG/PRODUCT</a>
            </li>
            <li class="nav-item">
                <a class="nav-link fw-bold active" href="wishlist.html">WISHLIST</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="catalog.html#deals">DEALS</a>
            </li>
            </ul>
            <div class="d-flex align-items-center gap-2 flex-grow-1" >
            <div class="input-group flex-grow-1" data-bs-theme="light">
                <a class="btn btn-outline-secondary" href="catalog.html">
                <i class="bi bi-search"></i>
                </a>
                <input type="text" class="form-control" placeholder="search">
            </div>
            <a class="btn btn-outline-secondary rounded-circle position-relative" href="Cart.html" aria-label="Cart">
                <!-- Added a notification badge -->
                <i class="bi bi-cart"></i>
                <span id="cartBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">1</span>
            </a>
            <a class="btn btn-outline-secondary rounded-circle position-relative" href="wishlist.html" aria-label="Wishlist">
                <!-- Added a notification badge -->
                <i class="bi bi-bag-heart-fill"></i>
                <span id="wishlistBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
            </a>
            </div>
        </div>
    </div>
</nav>

    <main class="flex-grow-1 py-4 px-4" id="wishlist-container">
        <!-- Populated from localStorage by script below -->
    </main>

    <footer class="py-3 px-4 mt-auto" style="background-color:#343A40;">
        <a href="#" class="text-white text-decoration-none small me-4">Customer Service</a>
        <a href="#" class="text-white text-decoration-none small me-4">Privacy Policy</a>
        <a href="#" class="text-white text-decoration-none small">About US</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function addToCart(name, price) {
        const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
        let cart = [];
        try { cart = JSON.parse(localStorage.getItem('cart')) || []; } catch {}
        const existing = cart.find(i => i.id === id);
        if (existing) { existing.qty += 1; } else { cart.push({ id, name, price: parseFloat(price), qty: 1, image: '', alt: name }); }
        localStorage.setItem('cart', JSON.stringify(cart));
      }

      function renderWishlist() {
        const list = JSON.parse(localStorage.getItem('wishlist')) || [];
        const container = document.getElementById('wishlist-container');
        if (list.length === 0) {
          container.innerHTML = '<p class="text-muted">Your wishlist is empty. <a href="catalog.html">Browse the catalog</a> to add items.</p>';
          return;
        }
        container.innerHTML = list.map(item => `
          <div class="wishlist-row d-flex align-items-center bg-secondary bg-opacity-25 rounded-3 p-3 mb-3 position-relative">
            <a href="${item.href}" class="stretched-link"></a>
            <div class="bg-light border rounded d-flex justify-content-center align-items-center text-center flex-shrink-0" style="width:110px; height:80px; font-size:1rem;">
              Picture<br>of Item
            </div>
            <div class="flex-grow-1 px-4">
              <p class="mb-0 fw-semibold">${item.name}</p>
              <p class="mb-0 text-muted small">${item.label || ''}</p>
            </div>
            <div class="d-flex align-items-center gap-3 flex-shrink-0 pe-5 position-relative z-index-top">
              <p class="mb-0 fw-bold">${item.price}</p>
              <div class="d-flex flex-column gap-2">
                <a class="btn btn-light border rounded-pill" href="checkout.html">Buy Now</a>
                <button class="btn btn-light border rounded-pill add-to-cart-btn">Add to Cart</button>
              </div>
            </div>
            <button type="button" class="btn btn-sm btn-outline-secondary rounded-circle position-absolute top-0 end-0 m-2 z-index-top remove-btn" data-name="${item.name}" style="width:28px;height:28px;padding:0;line-height:1;">
              &#x2715;
            </button>
          </div>`).join('');

        // Remove button — deletes from localStorage and re-renders
        container.querySelectorAll('.remove-btn').forEach(btn => {
          btn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            let list = JSON.parse(localStorage.getItem('wishlist')) || [];
            list = list.filter(i => i.name !== this.dataset.name);
            localStorage.setItem('wishlist', JSON.stringify(list));
            renderWishlist();
          });
        });

        // Add to cart
        container.querySelectorAll('.add-to-cart-btn').forEach(btn => {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            const row = this.closest('.wishlist-row');
            const name = row.querySelector('.fw-semibold')?.textContent.trim();
            const priceRaw = row.querySelector('.fw-bold')?.textContent.trim();
            const price = parseFloat(priceRaw.replace(/[^0-9.]/g, ''));
            if (name) addToCart(name, price);
            const badge = document.getElementById('cartBadge');
            badge.classList.remove('d-none');
            let cart = [];
            try { cart = JSON.parse(localStorage.getItem('cart')) || []; } catch {}
            badge.textContent = cart.reduce((sum, i) => sum + i.qty, 0);
          });
        });
      }

      renderWishlist();
    </script>
</body>
</html>
